id: disrupt
title: "Disrupt Portal"
version: 1.2.2
release-notes: |
  - Memo-less wallet transactions are no longer hidden from Transaction History
  - Smarter receiver labels: Blink username for intraledger, address for on-chain,
    "Lightning payment sent/received" otherwise
  - Wallet transactions now merge with portal records by payment hash (no duplicates)
license: GPL-3.0
min-os-version: 0.3.5
wrapper-repo: https://github.com/ericscalibur/Disrupt
upstream-repo: https://github.com/ericscalibur/Disrupt
support-site: https://github.com/ericscalibur/Disrupt/issues
marketing-site: https://ericscalibur.github.io/Disrupt/
donation-url: ~
build: ["make"]
description:
  short: Lightning payroll & payments dashboard for small teams
  long: |
    A self-hosted Lightning Network business payment platform. Pay employees and
    suppliers over Lightning or on-chain Bitcoin via your Blink wallet. Includes
    draft/approve workflows, role-based access, batch CSV payments, configurable
    tax withholding, analytics, and full transaction history. No bank required.

assets:
  license: LICENSE
  icon: icon.png
  instructions: instructions.md

main:
  type: docker
  image: main
  entrypoint: docker_entrypoint.sh
  args: []
  mounts:
    main: /app/data
    cert: /mnt/cert

health-checks:
  web-ui:
    name: Web Interface
    success-message: Disrupt Portal is ready
    type: docker
    image: main
    entrypoint: check-web.sh
    args: []
    io-format: json
    inject: true

config:
  get:
    type: docker
    image: main
    entrypoint: configurator.sh
    args: ["get"]
    io-format: yaml
    mounts:
      main: /app/data
  set:
    type: docker
    image: main
    entrypoint: configurator.sh
    args: ["set"]
    io-format: yaml
    mounts:
      main: /app/data

properties:
  type: docker
  image: main
  entrypoint: properties.sh
  args: []
  io-format: json

volumes:
  main:
    type: data
  cert:
    type: certificate
    interface-id: main

interfaces:
  main:
    name: Web Interface
    description: Disrupt Portal dashboard for payments, payroll, and analytics
    tor-config:
      port-mapping:
        80: "3000"
    lan-config:
      443:
        ssl: true
        internal: 3000
    ui: true
    protocols:
      - tcp
      - http

dependencies: {}

backup:
  create:
    type: docker
    image: main
    entrypoint: backup.sh
    args: ["create"]
    io-format: yaml
  restore:
    type: docker
    image: main
    entrypoint: backup.sh
    args: ["restore"]
    io-format: yaml

migrations:
  from: {}
  to: {}

# Builds the .s9pk automatically and attaches it to GitHub releases.
#
# WHY: Right now users must install Docker, Rust, and start-sdk just to get a
# .s9pk they can sideload. This workflow does that build on GitHub's servers —
# every time you publish a release, a ready-to-sideload .s9pk appears as a
# downloadable asset. Users just download and drag-drop into StartOS.
#
# HOW GITHUB ACTIONS WORK (quick primer):
# - This file lives at .github/workflows/build-s9pk.yml in your repo
# - "on:" says WHEN it runs (here: when you publish a release, or manually)
# - "jobs:" are the machines GitHub spins up; "steps:" run in order on them
# - Each "uses:" pulls in a pre-made action (like an npm package for CI)
# - Each "run:" is just a shell command
# - Works the same in Deploy-Deadman-Switch — copy this file there too
#   (its Makefile must call `start-sdk pack`, like Disrupt's does)

name: Build s9pk

on:
  release:
    types: [published]      # runs when you click "Publish release" on GitHub
  workflow_dispatch:         # also lets you run it manually from the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # needed to upload the .s9pk to the release

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Docker buildx
        uses: docker/setup-buildx-action@v3

      - name: Install yq
        run: sudo snap install yq

      - name: Cache start-sdk
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/start-sdk
          key: start-sdk-${{ runner.os }}-v0.3.5.1

      - name: Build start-sdk (skipped when the cached binary is present)
        run: |
          set -x
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          export PATH="$HOME/.cargo/bin:$PATH"
          if command -v start-sdk; then start-sdk --version; exit 0; fi
          rustup toolchain install 1.78.0 --profile minimal
          rustup default 1.78.0
          git clone --depth 1 --branch v0.3.5.1 https://github.com/Start9Labs/start-os.git /tmp/start-os
          cd /tmp/start-os
          git submodule update --init --recursive --depth 1
          make sdk
          start-sdk --version

      - name: Initialize start-sdk
        run: start-sdk init

      - name: Build the package
        run: make

      - name: Upload .s9pk to the release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload ${{ github.event.release.tag_name }} *.s9pk

      - name: Upload .s9pk as workflow artifact (manual runs)
        if: github.event_name != 'release'
        uses: actions/upload-artifact@v4
        with:
          name: s9pk
          path: "*.s9pk"
